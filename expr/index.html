<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/hint/show-hint.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/material-darker.min.css"
        />
        <style>
            :root {
                --jv-bg: #ffffff;
                --jv-bg-header: #f5f5f5;
                --jv-border: rgba(0, 0, 0, 0.1);
                --jv-text-muted: #999;
                --jv-key: #7c3aed;
                --jv-string: #b91c1c;
                --jv-number: #1d4ed8;
                --jv-boolean: #0f766e;
                --jv-null: #999;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --jv-bg: #1e1e2e;
                    --jv-bg-header: #181825;
                    --jv-border: rgba(255, 255, 255, 0.08);
                    --jv-text-muted: #6c6c8a;
                    --jv-key: #c792ea;
                    --jv-string: #f07178;
                    --jv-number: #f78c6c;
                    --jv-boolean: #89ddff;
                    --jv-null: #6c6c8a;
                }
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: var(--font-sans, sans-serif);
                background: var(--color-background-tertiary);
                color: var(--color-text-primary);
                height: 100vh;
                display: flex;
                flex-direction: column;
            }

            .toolbar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 9px 14px;
                background: var(--color-background-primary);
                border-bottom: 0.5px solid var(--color-border-tertiary);
                flex-shrink: 0;
            }
            .toolbar-title {
                font-size: 14px;
                font-weight: 500;
            }
            .badge {
                font-size: 11px;
                padding: 2px 9px;
                border-radius: 999px;
                background: var(--color-background-success);
                color: var(--color-text-success);
                transition:
                    background 0.2s,
                    color 0.2s;
            }
            .badge.error {
                background: var(--color-background-danger);
                color: var(--color-text-danger);
            }
            .badge.warning {
                background: var(--color-background-warning);
                color: var(--color-text-warning);
            }
            .spacer {
                flex: 1;
            }
            .btn {
                font-family: var(--font-sans);
                font-size: 12px;
                padding: 5px 12px;
                border: 0.5px solid var(--color-border-secondary);
                border-radius: var(--border-radius-md);
                background: transparent;
                color: var(--color-text-primary);
                cursor: pointer;
            }
            .btn:hover {
                background: var(--color-background-secondary);
            }

            .main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }
            .editor-pane {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .pane-label {
                font-size: 11px;
                color: var(--color-text-tertiary);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: 5px 14px;
                background: var(--color-background-secondary);
                border-bottom: 0.5px solid var(--color-border-tertiary);
                flex-shrink: 0;
            }

            .cm-wrap {
                flex: 1;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .CodeMirror {
                flex: 1;
                height: 100%;
                font-family: var(--font-mono, monospace) !important;
                font-size: 15px;
                line-height: 1.6;
            }
            .CodeMirror-scroll {
                flex: 1;
            }

            .error-bar {
                font-size: 14px;
                color: var(--color-text-danger);
                padding: 7px 14px;
                background: var(--color-background-danger);
                border-top: 0.5px solid var(--color-border-tertiary);
                display: none;
                flex-shrink: 0;
                line-height: 1.5;
            }

            /* value hint gutter */
            .CodeMirror .val-hint-gutter {
                min-width: 220px;
            }
            .CodeMirror-gutter-elt .val-hint {
                font-family: var(--font-mono, monospace);
                font-size: 12px;
                color: var(--color-text-tertiary);
                padding-right: 16px;
                white-space: nowrap;
                width: 220px;
                overflow: hidden;
                text-overflow: ellipsis;
                display: block;
                line-height: 24px;
                opacity: 0.75;
                text-align: right;
                cursor: pointer;
            }
            .CodeMirror-gutter-elt .val-hint.copied {
                color: var(--color-text-success);
                opacity: 1;
            }
            /* JSON tree viewer */
            .json-panel {
                width: 480px;
                min-width: 260px;
                max-width: 50vw;
                display: flex;
                flex-direction: column;
                border-left: 0.5px solid var(--jv-border);
                background: var(--jv-bg);
                overflow: hidden;
                flex-shrink: 0;
            }
            .json-panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 5px 14px;
                background: var(--jv-bg-header);
                border-bottom: 0.5px solid var(--jv-border);
                flex-shrink: 0;
            }
            .json-panel-label {
                font-size: 11px;
                color: var(--jv-text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .json-panel-close {
                background: none;
                border: none;
                color: var(--jv-text-muted);
                cursor: pointer;
                font-size: 16px;
                line-height: 1;
                padding: 0 2px;
            }
            .json-panel-close:hover {
                color: var(--color-text);
            }
            .json-panel-body {
                flex: 1;
                overflow: auto;
                padding: 10px 14px;
                font-family: var(--font-mono, monospace);
                font-size: 13px;
                line-height: 1.7;
                color: var(--jv-text-muted);
            }
            .jv-node {
                display: block;
                white-space: nowrap;
            }
            .jv-toggle {
                display: inline-block;
                width: 1em;
                cursor: pointer;
                user-select: none;
                color: var(--jv-text-muted);
                font-size: 10px;
                margin-right: 2px;
            }
            .jv-key {
                color: var(--jv-key);
            }
            .jv-string {
                color: var(--jv-string);
            }
            .jv-number {
                color: var(--jv-number);
            }
            .jv-boolean {
                color: var(--jv-boolean);
            }
            .jv-null {
                color: var(--jv-null);
            }
            .jv-type {
                color: var(--jv-text-muted);
                font-size: 11px;
            }
            .jv-children {
                display: block;
                padding-left: 1.6em;
            }
            .jv-children.collapsed {
                display: none;
            }

            .cm-matchhighlight {
                background: rgba(255, 200, 0, 0.25);
                border-radius: 2px;
                outline: 1px solid rgba(255, 200, 0, 0.4);
            }
            @media (max-width: 600px) {
                .CodeMirror .val-hint-gutter {
                    min-width: 110px;
                }
                .CodeMirror-gutter-elt .val-hint {
                    font-size: 10px;
                    width: 110px;
                    padding-right: 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="toolbar">
            <span class="toolbar-title">YAML Calculator</span>
            <span class="badge" id="status">Valid</span>
            <span class="spacer"></span>
            <button class="btn" id="runBtn" onclick="runApi()">
                Run <kbd style="font-size: 10px; opacity: 0.6">⌘↵</kbd>
            </button>
            <button class="btn" onclick="copyPermalink()">
                Copy permalink
            </button>
            <button class="btn" onclick="clearEditor()">Clear</button>
        </div>

        <div class="main">
            <div class="editor-pane">
                <div class="pane-label">RESULTS</div>
                <div class="cm-wrap">
                    <textarea id="ta"></textarea>
                </div>
                <div class="error-bar" id="errorBar"></div>
            </div>
            <div class="json-panel" id="jsonPanel" style="display: none">
                <div class="json-panel-header">
                    <span class="json-panel-label">Value</span>
                    <button
                        class="json-panel-close"
                        onclick="closeJsonPanel()"
                        title="Close"
                    >
                        ✕
                    </button>
                </div>
                <div class="json-panel-body" id="jsonPanelBody"></div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/yaml/yaml.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/hint/show-hint.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/match-highlighter.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
        <script src="wasm_exec.js"></script>
        <script>
            if (!location.search.includes("go=1")) {
                window.wasmReady = new Promise((resolve) => {
                    const go = new Go();
                    WebAssembly.instantiateStreaming(
                        fetch("main.wasm"),
                        go.importObject,
                    ).then((result) => {
                        go.run(result.instance); // Starts the Go runtime
                        resolve();
                    });
                });
            }
        </script>
        <script>
            let cache = {};
            function fetchJSON(url) {
                if (cache[url]) return cache[url];
                const request = new XMLHttpRequest();
                // The third parameter 'false' makes it synchronous
                // we need this for easier WASM interop. Sorry.
                request.open("GET", url, false);
                request.send(null);

                cache[url] = request.responseText;
                return cache[url];
            }
        </script>
        <script>
            const DEFAULT = `
a: 1
b: 2
c: a + b
`;

            const isDark = window.matchMedia(
                "(prefers-color-scheme: dark)",
            ).matches;

            const GUTTER = "val-hint-gutter";

            const cm = CodeMirror.fromTextArea(document.getElementById("ta"), {
                mode: "yaml",
                theme: isDark ? "material-darker" : "default",
                gutters: [GUTTER, "CodeMirror-linenumbers"],
                tabSize: 2,
                indentWithTabs: false,
                lineWrapping: false,
                autofocus: true,
                highlightSelectionMatches: {
                    showToken: /\w/,
                    annotateScrollbar: false,
                },
                extraKeys: {
                    Tab: (cm) => cm.execCommand("insertSoftTab"),
                    "Cmd-Enter": runApi,
                    "Ctrl-Enter": runApi,
                    "Ctrl-Space": (cm) => cm.showHint({ hint: yamlKeyHint }),
                    "Cmd-S": save,
                    "Ctrl-S": save,
                },
            });

            function yamlKeyHint(cm) {
                const cursor = cm.getCursor();
                const src = cm.getValue();
                const lines = src.split("\n");

                // collect keys defined on lines strictly above the cursor
                const keys = [];
                for (let i = 0; i < cursor.line; i++) {
                    const m = lines[i].match(/^([a-zA-Z_][\w-]*):/);
                    if (m && !keys.includes(m[1])) keys.push(m[1]);
                }

                // find the word being typed at the cursor
                const lineText = cm.getLine(cursor.line);
                const start = cursor.ch - 1;
                let wordStart = start;
                while (wordStart > 0 && /\w/.test(lineText[wordStart - 1]))
                    wordStart--;
                const typed = lineText.slice(wordStart, cursor.ch);

                const list = keys.filter(
                    (k) => k.startsWith(typed) && k !== typed,
                );
                if (!list.length) return null;

                return {
                    list,
                    from: CodeMirror.Pos(cursor.line, wordStart),
                    to: CodeMirror.Pos(cursor.line, cursor.ch),
                };
            }

            // trigger hint automatically while typing word characters
            function triggerHintIfNeeded(cm) {
                const cursor = cm.getCursor();
                const ch = cm.getLine(cursor.line)[cursor.ch - 1];
                if (ch && /\w/.test(ch)) {
                    cm.showHint({ hint: yamlKeyHint, completeSingle: false });
                }
            }

            const STORAGE_KEY = "govaluate-editor-content";

            function loadInitialContent() {
                const hash = window.location.hash.slice(1);
                if (hash) {
                    try {
                        return atob(hash);
                    } catch (e) {}
                }
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved !== null ? saved : DEFAULT;
            }

            cm.setValue(loadInitialContent());
            cm.on("change", (cm, change) => {
                localStorage.setItem(STORAGE_KEY, cm.getValue());
                validate();
                if (change.origin === "+input") triggerHintIfNeeded(cm);
            });

            const statusEl = document.getElementById("status");
            const errorBar = document.getElementById("errorBar");

            // map from 0-based line index -> display string, given an API response object
            function buildLineValueMap(src, apiValues) {
                const map = {};
                if (!apiValues || typeof apiValues !== "object") return map;
                src.split("\n").forEach((line, i) => {
                    const m = line.match(/^([a-zA-Z_][\w-]*):/);
                    if (!m) return;
                    const key = m[1];
                    if (key in apiValues) map[i] = apiValues[key];
                });
                return map;
            }

            function formatVal(v) {
                if (v === null || v === undefined) return "null";
                if (typeof v === "object")
                    return Array.isArray(v)
                        ? `[${v.length}]`
                        : `{${Object.keys(v).length}}`;
                return String(v);
            }

            function updateGutter(lineValMap) {
                const totalLines = cm.lineCount();
                for (let i = 0; i < totalLines; i++) {
                    const val = lineValMap[i];
                    if (val !== undefined) {
                        const el = document.createElement("span");
                        el.className = "val-hint";
                        el.textContent = formatVal(val);
                        el.title = formatVal(val);
                        el.addEventListener("click", () => {
                            showJsonPanel(val);
                            navigator.clipboard
                                .writeText(formatVal(val))
                                .then(() => {
                                    el.classList.add("copied");
                                    const prev = el.textContent;
                                    el.textContent = "Copied!";
                                    setTimeout(() => {
                                        el.classList.remove("copied");
                                        el.textContent = prev;
                                    }, 1200);
                                });
                        });
                        cm.setGutterMarker(i, GUTTER, el);
                    } else {
                        cm.setGutterMarker(i, GUTTER, null);
                    }
                }
            }

            function validate() {
                try {
                    jsyaml.load(cm.getValue());
                    statusEl.textContent = "Valid";
                    statusEl.className = "badge";
                    errorBar.style.display = "none";
                } catch (e) {
                    statusEl.textContent = "Error";
                    statusEl.className = "badge error";
                    errorBar.style.display = "block";
                    errorBar.textContent = e.message;
                }
            }

            async function runApi() {
                closeJsonPanel();
                const btn = document.getElementById("runBtn");
                btn.disabled = true;
                btn.textContent = "Running…";
                try {
                    let apiValues;
                    if (window.wasmReady) {
                        await window.wasmReady;
                        apiValues = window.evaluateYaml(cm.getValue());
                    } else {
                        const res = await fetch("/api/evaluate", {
                            method: "POST",
                            headers: { "Content-Type": "application/x-yaml" },
                            body: cm.getValue(),
                        });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        apiValues = await res.json();
                    }
                    updateGutter(buildLineValueMap(cm.getValue(), apiValues));
                    location.replace("#" + btoa(cm.getValue()));
                    statusEl.textContent = "Done";
                    statusEl.className = "badge";
                    setTimeout(() => {
                        statusEl.textContent = "Valid";
                    }, 1500);
                } catch (e) {
                    statusEl.textContent = "API Error";
                    statusEl.className = "badge error";
                    errorBar.style.display = "block";
                    errorBar.textContent = e.message;
                } finally {
                    btn.disabled = false;
                    btn.innerHTML =
                        'Run <kbd style="font-size:10px;opacity:0.6">⌘↵</kbd>';
                }
            }

            function copyPermalink() {
                const hash = btoa(cm.getValue());
                const url = location.origin + location.pathname + "#" + hash;
                navigator.clipboard.writeText(url).then(() => {
                    const prev = [statusEl.textContent, statusEl.className];
                    statusEl.textContent = "Copied!";
                    statusEl.className = "badge warning";
                    setTimeout(() => {
                        [statusEl.textContent, statusEl.className] = prev;
                    }, 1200);
                });
            }

            function clearEditor() {
                cm.setValue("");
            }

            async function save() {
                if (location.search.includes("go=1")) {
                    try {
                        const res = await fetch("/api/save", {
                            method: "POST",
                            headers: { "Content-Type": "application/x-yaml" },
                            body: cm.getValue(),
                        });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const prev = [statusEl.textContent, statusEl.className];
                        statusEl.textContent = "Saved";
                        statusEl.className = "badge";
                        setTimeout(() => {
                            [statusEl.textContent, statusEl.className] = prev;
                        }, 1500);
                    } catch (e) {
                        statusEl.textContent = "Save Error";
                        statusEl.className = "badge error";
                        errorBar.style.display = "block";
                        errorBar.textContent = e.message;
                    }
                }
            }

            function buildJsonTree(value, key) {
                const node = document.createElement("div");
                node.className = "jv-node";

                if (value !== null && typeof value === "object") {
                    const isArray = Array.isArray(value);
                    const entries = isArray
                        ? value.map((v, i) => [String(i), v])
                        : Object.entries(value);
                    const count = entries.length;
                    const typeName = isArray
                        ? `Array[${count}]`
                        : `Object{${count}}`;

                    const toggle = document.createElement("span");
                    toggle.className = "jv-toggle";
                    toggle.textContent = "▾";

                    const label = document.createElement("span");
                    if (key !== undefined) {
                        const k = document.createElement("span");
                        k.className = "jv-key";
                        k.textContent = key + ": ";
                        label.appendChild(k);
                    }
                    const t = document.createElement("span");
                    t.className = "jv-type";
                    t.textContent = typeName;
                    label.appendChild(t);

                    const children = document.createElement("div");
                    children.className = "jv-children";
                    if (isArray) children.classList.add("collapsed");
                    entries.forEach(([k, v]) => {
                        children.appendChild(buildJsonTree(v, k));
                    });

                    toggle.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const collapsed =
                            children.classList.toggle("collapsed");
                        toggle.textContent = collapsed ? "▸" : "▾";
                    });

                    if (isArray) toggle.textContent = "▸";

                    node.appendChild(toggle);
                    node.appendChild(label);
                    node.appendChild(children);
                } else {
                    const toggle = document.createElement("span");
                    toggle.className = "jv-toggle";
                    toggle.textContent = " ";
                    node.appendChild(toggle);

                    if (key !== undefined) {
                        const k = document.createElement("span");
                        k.className = "jv-key";
                        k.textContent = key + ": ";
                        node.appendChild(k);
                    }

                    const v = document.createElement("span");
                    if (value === null) {
                        v.className = "jv-null";
                        v.textContent = "null";
                    } else if (typeof value === "string") {
                        v.className = "jv-string";
                        v.textContent = `"${value}"`;
                    } else if (typeof value === "number") {
                        v.className = "jv-number";
                        v.textContent = String(value);
                    } else if (typeof value === "boolean") {
                        v.className = "jv-boolean";
                        v.textContent = String(value);
                    } else {
                        v.textContent = String(value);
                    }
                    node.appendChild(v);
                }
                return node;
            }

            function showJsonPanel(value) {
                const panel = document.getElementById("jsonPanel");
                const body = document.getElementById("jsonPanelBody");
                body.innerHTML = "";
                body.appendChild(buildJsonTree(value));
                panel.style.display = "flex";
            }

            function closeJsonPanel() {
                document.getElementById("jsonPanel").style.display = "none";
            }

            validate();
            runApi();
        </script>
    </body>
</html>
